<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator | JPman</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  html { background: var(--bg-start); }
  :root {
    --bg-start: #1a0000;
    --bg-end: #3d0000;
    --panel: rgba(52,0,0,0.45);
    --panel-border: rgba(255,82,82,0.26);
    --panel-border-strong: rgba(255,74,74,0.58);
    --text-main: #ffffff;
    --text-soft: rgba(255,238,238,0.8);
    --text-muted: rgba(255,215,215,0.66);
    --accent: #ff4d5f;
    --accent-bright: #ff6b7c;
    --shadow-soft: 0 18px 45px rgba(0,0,0,0.35);
    --card-width: min(92vw, 470px);
    --radius-xl: 30px;
    --radius-lg: 22px;
    --radius-md: 16px;
    --ease-out: cubic-bezier(0.22,1,0.36,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    min-height: 100vh;
    font-family: "Segoe UI","Helvetica Neue",Arial,sans-serif;
    color: var(--text-main);
    background:
      radial-gradient(circle at top, rgba(255,85,85,0.14), transparent 28%),
      linear-gradient(135deg, var(--bg-start), var(--bg-end), #260000, #430000);
    background-size: 180% 180%;
    animation: gradientShift 8s ease-in-out infinite;
    display: grid;
    place-items: center;
    overflow-x: hidden;
    padding: 32px 16px;
    isolation: isolate;
  }
  body::before, body::after {
    content:""; position:fixed; border-radius:999px;
    pointer-events:none; filter:blur(42px); z-index:-2;
  }
  body::before {
    width:18rem; height:18rem; top:-4rem; right:-3rem;
    background:rgba(255,84,84,0.14);
    animation: driftGlow 10s ease-in-out infinite;
  }
  body::after {
    width:20rem; height:20rem; bottom:-6rem; left:-6rem;
    background:rgba(200,20,40,0.18);
    animation: driftGlow 12s ease-in-out infinite reverse;
  }

  .particles { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:-1; }
  .particle {
    position:absolute; bottom:-12vh; border-radius:50%;
    background: radial-gradient(circle, rgba(255,116,116,0.95) 0%, rgba(255,77,95,0.55) 48%, rgba(255,77,95,0) 75%);
    animation: floatUp linear infinite;
  }

  .shell {
    width: var(--card-width);
    padding: 34px 22px 28px;
    border-radius: var(--radius-xl);
    background: linear-gradient(180deg, rgba(35,0,0,0.44), rgba(20,0,0,0.52));
    border: 1px solid rgba(255,90,90,0.14);
    box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    position: relative;
    overflow: hidden;
    display: grid;
    gap: 20px;
    animation: revealUp 0.75s var(--ease-out) both;
  }
  .shell::before {
    content:""; position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 24%, transparent 72%, rgba(255,120,120,0.06));
    pointer-events:none;
  }

  h1 {
    font-size: clamp(1.5rem,5vw,1.9rem);
    letter-spacing: 0.03em;
    text-align: center;
    text-shadow: 0 0 16px rgba(255,80,80,0.25);
  }
  h1 span { color: var(--accent-bright); }

  /* Input */
  .input-wrap { position: relative; }
  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    background: rgba(18,0,0,0.68);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-md);
    color: var(--text-main);
    font-size: 1rem;
    outline: none;
    transition: border-color 220ms ease, box-shadow 220ms ease;
    backdrop-filter: blur(10px);
  }
  input[type="text"]::placeholder { color: rgba(255,180,180,0.35); }
  input[type="text"]:focus {
    border-color: var(--panel-border-strong);
    box-shadow: 0 0 0 3px rgba(255,77,95,0.12);
  }

  /* QR preview */
  .qr-panel {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 24px 18px 20px;
    border-radius: var(--radius-lg);
    background: linear-gradient(180deg, var(--panel), rgba(26,0,0,0.55));
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 16px 30px rgba(0,0,0,0.18);
    transition: border-color 220ms ease, box-shadow 220ms ease;
  }
  .qr-panel:hover {
    border-color: var(--panel-border-strong);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 20px 34px rgba(0,0,0,0.24), 0 0 26px rgba(255,77,95,0.18);
  }

  .qr-frame {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s;
    position: relative;
  }
  .qr-frame.empty { opacity: 0.15; }
  .qr-frame #qr canvas, .qr-frame #qr img { display: block; }

  .placeholder-icon {
    position: absolute;
    font-size: 3rem;
    opacity: 0.25;
    pointer-events: none;
  }

  /* Buttons */
  .actions {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 16px;
    border-radius: var(--radius-md);
    border: 1px solid var(--panel-border);
    background: linear-gradient(180deg, rgba(58,0,0,0.42), rgba(26,0,0,0.58));
    color: var(--text-soft);
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease, background 220ms ease, color 220ms ease;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 8px 18px rgba(0,0,0,0.18);
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content:""; position:absolute; inset:0;
    background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
    transform: translateX(-120%);
    transition: transform 320ms ease;
  }
  .btn:hover:not(:disabled), .btn:focus-visible:not(:disabled) {
    transform: translateY(-3px);
    border-color: rgba(255,95,95,0.66);
    color: var(--text-main);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 14px 28px rgba(0,0,0,0.24), 0 0 24px rgba(255,77,95,0.22);
    background: linear-gradient(180deg, rgba(72,0,0,0.48), rgba(30,0,0,0.64));
  }
  .btn:hover:not(:disabled)::before { transform: translateX(120%); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn svg { flex: 0 0 auto; }

  /* Ripple */
  .ripple {
    position:absolute; border-radius:50%;
    transform:translate(-50%,-50%) scale(0);
    background: radial-gradient(circle, rgba(255,145,145,0.48) 0%, rgba(255,77,95,0.18) 45%, rgba(255,77,95,0) 72%);
    animation: ripplePulse 650ms ease-out forwards;
    pointer-events:none;
  }

  /* Fullscreen overlay */
  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,0,0,0.92);
    backdrop-filter: blur(8px);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-direction: column;
    gap: 20px;
  }
  #overlay.active { display: flex; }
  #overlay .fs-hint {
    color: rgba(255,200,200,0.5);
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  #overlay .fs-frame {
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 0 80px rgba(255,77,95,0.3);
  }
  #overlay #qr-full canvas, #overlay #qr-full img { display: block; }

  @keyframes revealUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes gradientShift {
    0%,100% { background-position:0% 50%; }
    50%      { background-position:100% 50%; }
  }
  @keyframes floatUp {
    0%   { opacity:0; transform:translate3d(0,0,0) scale(0.7); }
    10%  { opacity:0.55; }
    85%  { opacity:0.28; }
    100% { opacity:0; transform:translate3d(var(--drift-x),-115vh,0) scale(1.08); }
  }
  @keyframes ripplePulse {
    from { opacity:0.85; transform:translate(-50%,-50%) scale(0); }
    to   { opacity:0;    transform:translate(-50%,-50%) scale(3.4); }
  }
  @keyframes driftGlow {
    0%,100% { transform:translate3d(0,0,0) scale(1); }
    50%      { transform:translate3d(1rem,-0.8rem,0) scale(1.08); }
  }

  @media (max-width:560px) {
    body { padding:22px 12px; }
    .shell { padding:28px 16px 20px; border-radius:24px; }
    .actions { flex-direction: column; }
  }
  @media (prefers-reduced-motion:reduce) {
    *,*::before,*::after { animation-duration:.01ms!important; animation-iteration-count:1!important; transition-duration:.01ms!important; }
  }
</style>
</head>
<body>

<div class="particles" aria-hidden="true"></div>

<main class="shell">
  <h1>QR <span>Generator</span></h1>

  <div class="input-wrap">
    <input type="text" id="txt" placeholder="Enter URL or any text…" autofocus autocomplete="off">
  </div>

  <div class="qr-panel">
    <div class="qr-frame empty" id="qr-frame">
      <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="3" height="3" rx="0.5"/><rect x="18" y="14" width="3" height="3" rx="0.5"/><rect x="14" y="18" width="3" height="3" rx="0.5"/><rect x="18" y="18" width="3" height="3" rx="0.5"/>
      </svg>
      <div id="qr"></div>
    </div>

    <div class="actions">
      <button class="btn" id="btn-fs" disabled>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        Fullscreen
      </button>
      <button class="btn" id="btn-dl" disabled>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PNG
      </button>
    </div>
  </div>
</main>

<div id="overlay">
  <div class="fs-frame"><div id="qr-full"></div></div>
  <p class="fs-hint">Click anywhere or press Esc to close</p>
</div>

<script>
  // Particles
  const host = document.querySelector('.particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('span');
    const sz = (Math.random()*5+3).toFixed(2);
    p.className = 'particle';
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${(Math.random()*100).toFixed(2)}%;animation-duration:${(Math.random()*8+10).toFixed(2)}s;animation-delay:${(Math.random()*-18).toFixed(2)}s;opacity:${(Math.random()*0.4+0.16).toFixed(2)};--drift-x:${(Math.random()*60-30).toFixed(2)}px`;
    host.appendChild(p);
  }

  // Ripple on buttons
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const r = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const sz = Math.max(rect.width, rect.height) * 0.9;
      r.className = 'ripple';
      r.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left}px;top:${e.clientY-rect.top}px`;
      btn.appendChild(r);
      r.addEventListener('animationend', () => r.remove(), {once:true});
    });
  });

  const txt = document.getElementById('txt');
  const frame = document.getElementById('qr-frame');
  const qrEl = document.getElementById('qr');
  const qrFull = document.getElementById('qr-full');
  const btnFs = document.getElementById('btn-fs');
  const btnDl = document.getElementById('btn-dl');
  const overlay = document.getElementById('overlay');

  let timer;
  txt.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(() => generate(txt.value), 280); });

  function generate(val) {
    qrEl.innerHTML = '';
    qrFull.innerHTML = '';
    if (!val.trim()) {
      frame.classList.add('empty');
      btnFs.disabled = btnDl.disabled = true;
      return;
    }
    frame.classList.remove('empty');
    btnFs.disabled = btnDl.disabled = false;
    new QRCode(qrEl, {text:val, width:160, height:160, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.H});
    const fs = Math.min(window.innerWidth, window.innerHeight) - 100;
    new QRCode(qrFull, {text:val, width:fs, height:fs, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.H});
  }

  btnFs.addEventListener('click', () => overlay.classList.add('active'));
  overlay.addEventListener('click', () => overlay.classList.remove('active'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('active'); });

  btnDl.addEventListener('click', () => {
    const c = qrEl.querySelector('canvas');
    if (!c) return;
    const a = document.createElement('a');
    a.download = 'qrcode.png';
    a.href = c.toDataURL('image/png');
    a.click();
  });
</script>
</body>
</html>
