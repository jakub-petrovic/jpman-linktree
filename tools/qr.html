<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator | JPman</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="particles" aria-hidden="true"></div>

<main class="shell qr-shell">
  <h1 class="qr-title">QR <span>Generator</span></h1>

  <div class="input-wrap">
    <input type="text" id="txt" placeholder="Enter URL or any text…" autofocus autocomplete="off">
  </div>

  <div class="qr-panel">
    <div class="qr-frame empty" id="qr-frame">
      <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="3" height="3" rx="0.5"/><rect x="18" y="14" width="3" height="3" rx="0.5"/><rect x="14" y="18" width="3" height="3" rx="0.5"/><rect x="18" y="18" width="3" height="3" rx="0.5"/>
      </svg>
      <div id="qr"></div>
    </div>

    <div class="actions">
      <button class="btn" id="btn-fs" disabled>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        Fullscreen
      </button>
      <button class="btn" id="btn-dl" disabled>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PNG
      </button>
    </div>
  </div>
</main>

<div id="overlay">
  <div class="fs-frame"><div id="qr-full"></div></div>
  <p class="fs-hint">Click anywhere or press Esc to close</p>
</div>

<script>
  // Particles
  const host = document.querySelector('.particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('span');
    const sz = (Math.random()*5+3).toFixed(2);
    p.className = 'particle';
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${(Math.random()*100).toFixed(2)}%;animation-duration:${(Math.random()*8+10).toFixed(2)}s;animation-delay:${(Math.random()*-18).toFixed(2)}s;opacity:${(Math.random()*0.4+0.16).toFixed(2)};--drift-x:${(Math.random()*60-30).toFixed(2)}px`;
    host.appendChild(p);
  }

  // Ripple on buttons
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const r = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const sz = Math.max(rect.width, rect.height) * 0.9;
      r.className = 'ripple';
      r.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left}px;top:${e.clientY-rect.top}px`;
      btn.appendChild(r);
      r.addEventListener('animationend', () => r.remove(), {once:true});
    });
  });

  const txt = document.getElementById('txt');
  const frame = document.getElementById('qr-frame');
  const qrEl = document.getElementById('qr');
  const qrFull = document.getElementById('qr-full');
  const btnFs = document.getElementById('btn-fs');
  const btnDl = document.getElementById('btn-dl');
  const overlay = document.getElementById('overlay');

  let timer;
  txt.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(() => generate(txt.value), 280); });

  function generate(val) {
    qrEl.innerHTML = '';
    qrFull.innerHTML = '';
    if (!val.trim()) {
      frame.classList.add('empty');
      btnFs.disabled = btnDl.disabled = true;
      return;
    }
    frame.classList.remove('empty');
    btnFs.disabled = btnDl.disabled = false;
    new QRCode(qrEl, {text:val, width:160, height:160, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.H});
    const fs = Math.min(window.innerWidth, window.innerHeight) - 100;
    new QRCode(qrFull, {text:val, width:fs, height:fs, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.H});
  }

  btnFs.addEventListener('click', () => overlay.classList.add('active'));
  overlay.addEventListener('click', () => overlay.classList.remove('active'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('active'); });

  btnDl.addEventListener('click', () => {
    const c = qrEl.querySelector('canvas');
    if (!c) return;
    const a = document.createElement('a');
    a.download = 'qrcode.png';
    a.href = c.toDataURL('image/png');
    a.click();
  });
</script>
</body>
</html>
